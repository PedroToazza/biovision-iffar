<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identificar Espécie — Biovision IFFar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#061a11">

  <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" type="image/x-icon">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-512.png') }}">
  <script>
    try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch(e){}
  </script>
</head>
<body class="page-identify">

  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <!-- ═══ NAV ═══ -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ url_for('index') }}" class="nav-brand">
        <img src="{{ url_for('static', filename='icons/logo_biovision.png') }}" alt="Biovision" class="nav-logo">
      </a>
      <div class="nav-actions">
        <a href="{{ url_for('index') }}" class="nav-link">← Início</a>
        <button id="themeToggle" class="theme-toggle" aria-label="Alternar modo escuro" title="Alternar tema">
          <span class="icon">
            <span class="sun" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
            <span class="moon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          </span>
        </button>
      </div>
    </div>
  </nav>

  <main class="identify-main">

    <!-- ═══ PAGE HEADER ═══ -->
    <div class="id-header anim-up" style="--d:0">
      <div class="id-badge">
        <span class="badge-dot"></span>
        IA Ativa
      </div>
      <h1>Identificar Espécie</h1>
      <p>Envie uma imagem para classificação via rede neural</p>
    </div>

    <!-- ═══ UPLOAD AREA ═══ -->
    <div class="id-upload-wrapper anim-up" style="--d:1">
      <div class="upload-box" id="uploadBox">

        <div class="upload-dropzone" id="uploadDropzone">
          <div class="upload-icon-wrap">
            <svg class="upload-svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <div class="upload-pulse"></div>
          </div>

          <h3 class="upload-title">Arraste sua imagem aqui</h3>
          <p class="upload-subtitle">ou clique no botão abaixo para selecionar</p>
          <p class="upload-formats">JPG, PNG, WEBP — Máx. 10MB</p>
        </div>

        <form id="formGaleria" enctype="multipart/form-data">
          <input type="file" name="imagem" id="imagem" accept="image/*" style="display:none;" onchange="mostrarImagem(this)">
          <button type="button" class="btn-select" onclick="document.getElementById('imagem').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            Selecionar imagem
          </button>
        </form>

        <div id="imagemPreview" style="display:none;">
          <div class="preview-badge">Imagem Selecionada</div>
          <div class="preview-frame">
            <img id="previewImagem" src="" alt="Imagem da Espécie"/>
          </div>
        </div>

        <button type="button" id="btnIdentificar" class="btn-identify" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          Iniciar identificação
        </button>

        <button type="button" id="btnNova" class="btn-nova" style="display:none;">
          ↻ Nova identificação
        </button>

        <div id="loading" class="loading" role="status" aria-live="polite" style="display:none;">
          <div class="spinner-group">
            <div class="spinner" aria-hidden="true"></div>
            <div class="spinner-ring" aria-hidden="true"></div>
          </div>
          <p id="loadingText">Identificando espécie e buscando dados...</p>
        </div>
      </div>
    </div>

    <!-- ═══ RESULTADO ═══ -->
    <div id="resultado" class="resultado-area"></div>

  </main>

  <!-- Modal de zoom -->
  <div id="zoomModal" class="zoom-modal">
    <div class="zoom-content" id="zoomContent"></div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js").catch(() => {});
    }

    const installInstructions = document.getElementById("installInstructions");
    if (installInstructions) {
      const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
      const isInStandalone = window.navigator.standalone === true;
      if ((isIOS && !isInStandalone) || (!isIOS && !window.matchMedia('(display-mode: standalone)').matches)) {
        installInstructions.style.display = "block";
      }
    }

    window.onbeforeunload = function () { window.scrollTo(0, 0); };
    window.addEventListener("load", () => { window.scrollTo({ top: 0, left: 0, behavior: "instant" }); });
  </script>
</body>
</html>
